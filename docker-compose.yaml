version: "3.5"

services:
  api01:
    # image: 4emcos/rinha-backend-nodejs:latest
    &api
    build: .
    hostname: api01
    environment:
      - DB_HOST=db

      - OTEL_RESOURCE_ATTRIBUTES=tenant.id=001
      - OTEL_SERVICE_NAME=rinha-backend1
      - OTEL_LOGS_EXPORTER=otlp
      - OTEL_TRACES_EXPORTER=otlp
      - OTEL_METRICS_EXPORTER=otlp

      - OTEL_EXPORTER_OTLP_PROTOCOL=grpc
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317/
      - OTEL_EXPORTER_OTLP_METRICS_ENDPOINT=http://otel-collector:4317/

      - OTEL_METRIC_EXPORT_INTERVAL=5000
      - OTEL_METRIC_EXPORT_TIMEOUT=5000
    restart: unless-stopped
    depends_on:
      - db
      - otel-collector
  api02:
    <<: *api
    hostname: api02
    environment:
      - OTEL_RESOURCE_ATTRIBUTES=tenant.id=002
      - OTEL_SERVICE_NAME=rinha-backend2
      - OTEL_LOGS_EXPORTER=otlp
      - OTEL_TRACES_EXPORTER=otlp
      - OTEL_METRICS_EXPORTER=otlp

      - OTEL_EXPORTER_OTLP_PROTOCOL=grpc
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317/
      - OTEL_EXPORTER_OTLP_METRICS_ENDPOINT=http://otel-collector:4317/

      - OTEL_METRIC_EXPORT_INTERVAL=5000
      - OTEL_METRIC_EXPORT_TIMEOUT=5000
    restart: unless-stopped
    depends_on:
      - db
      - otel-collector
  nginx:
    image: nginx:latest
    volumes:
      - ./devops/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api01
      - api02
    ports:
      - "9999:9999"
    deploy:
      resources:
        limits:
          cpus: "0.2"
          memory: "30MB"

  db:
    image: postgres:latest
    hostname: db
    environment:
      - POSTGRES_PASSWORD=oot123
      - POSTGRES_USER=admin
      - POSTGRES_DB=rinha
    ports:
      - "5432:5432"
    volumes:
      - ./devops/sql/ddl.sql:/docker-entrypoint-initdb.d/script.sql
    # deploy:
    #   resources:
    #     limits:
    #       cpus: "0.56"
    #       memory: "410MB"

    # ------ monitoring services -------

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.102.0
    command: ["--config=/etc/otel-collector-config.yml"]
    volumes:
      - ./infra/otel-collector-config.yml:/etc/otel-collector-config.yml:ro
    ports:
      - "4317:4317"
    restart: unless-stopped

