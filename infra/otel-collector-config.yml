receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317

  hostmetrics:
    collection_interval: 10s
    scrapers:
      cpu: {}
      memory: {}
      disk: {}
      filesystem: {}
      network: {}

exporters:
  otlp:
    endpoint: 212.85.23.26:4317
    tls:
      insecure: true

service:
  pipelines:
    metrics:
      receivers: [hostmetrics, otlp]      
      exporters: [otlp]
    logs:
      receivers: [otlp]      
      exporters: [otlp]
    traces:
      receivers: [otlp]      
      exporters: [otlp]
  telemetry:
      logs:
        level: "debug"
